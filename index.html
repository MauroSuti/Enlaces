<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Enlaces | Linktree Style</title>
    <style>
        /* CSS - Estilo Moderno */
        :root {
            --primary-bg: #09090b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #ffffff;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at top right, #1e1e2e, #09090b);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 90%;
            max-width: 500px;
            padding: 40px 0;
            text-align: center;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: #27272a;
            margin-bottom: 16px;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .bio { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            border-color: var(--accent);
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="https://via.placeholder.com/150" alt="Avatar" class="profile-pic">
        
        <h1>@Usuario</h1>
        <p class="bio">Somos Auritri, somos una banda</p>

        <div class="links-container">
            <a href="https://auritri.onrender.com" class="link-card" target="_blank">Página Web</a>
            <a href="https://www.instagram.com/auritrioficial/" class="link-card" target="_blank">Instagram</a>
            <a href="https://www.tiktok.com/@auritrioficial" class="link-card" target="_blank">TikTok</a>
            <a href="https://www.youtube.com/@auritri" class="link-card" target="_blank">YouTube</a>
            <a href="https://soundcloud.com/auritrioficial" class="link-card" target="_blank">SoundCloud</a>
            <a href="#" class="link-card" target="_blank">Spotify</a>
        </div>

        <div class="footer">
            Hecho con ❤️ por Auritri
        </div>
    </div>

    <script>
        // Un toque de interacción: loguear los clics (opcional)
        document.querySelectorAll('.link-card').forEach(item => {
            item.addEventListener('click', event => {
                console.log("Visitando: " + event.target.innerText);
            });
        });
    </script>
</body>
</html>
