<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auritri | Enlaces</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #09090b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #c62828; 
            --text-main: #ffffff;
            --muted: #9aa3a6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Cinzel", serif;
            background-color: black;
            background-image: radial-gradient(circle at top right, #1e1e2e, #09090b);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- HEADER CALCADO DEL ORIGINAL --- */
        /* --- HEADER RECALIBRADO PARA IDENTIDAD TOTAL --- */
header {
    padding: 40px 18px 20px; /* Espacio justo arriba y abajo */
    text-align: center;
    position: sticky;
    top: 0;
    backdrop-filter: blur(2px);
    z-index: 10;
    
    /* ELIMINAMOS min-height: 240px */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    
    transition: all 0.4s ease-in-out;
}

header.shrink {
    padding: 10px 18px; /* Se compacta al máximo al scrollear */
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.6);
}

header .logo {
    max-width: 200px; /* Un poco más chico para que no sea gigante en links */
    height: auto;
    display: block;
    margin: 0 auto;
    transition: max-width 0.4s ease-in-out;
}

header.shrink .logo {
    max-width: 100px; /* Se achica a la mitad */
}

header .tagline {
    margin: 10px 0 0; /* Espacio corto entre logo y texto */
    color: var(--muted);
    font-size: 0.9rem;
    transition: all 0.4s ease-in-out;
}

header.shrink .tagline {
    font-size: 0.7rem;
    margin-top: 5px;
}

/* --- WRAPPER PEGADO AL HEADER --- */
.wrapper {
    width: 90%;
    max-width: 500px;
    margin: 0 auto; /* Eliminamos márgenes negativos, ya no hacen falta */
    padding: 20px 0 60px;
}

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            font-family: 'Arial', sans-serif; /* Mantenemos Arial para legibilidad de botones */
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            position: relative;
        }

        .link-card i {
            font-size: 22px;
            position: absolute;
            left: 20px;
        }

        .link-card span {
            width: 100%;
            text-align: center;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(198, 40, 40, 0.25);
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 13px;
            color: var(--muted);
        }

        /* Ajuste para móviles */
        @media (max-width: 600px) {
            header { min-height: 280px; }
            header.shrink { min-height: 200px; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <img src="Relieve en negro.png" alt="Auritri" class="logo">
        <p class="tagline">Somos Auritri, somos una banda</p>
    </header>

    <main class="wrapper">
        <div class="links-container">
            <a href="https://auritri.onrender.com" class="link-card" target="_blank">
                <i class="fas fa-globe"></i>
                <span>Página Web</span>
            </a>
            <a href="https://www.instagram.com/auritrioficial/" class="link-card" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://www.tiktok.com/@auritrioficial" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://" class="link-card" target="_blank">
                <i class="fab fa-facebook"></i>
                <span>Facebook</span>
            </a>
            <a href="https://www.youtube.com/@auritri" class="link-card" target="_blank">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>
            <a href="https://soundcloud.com/auritrioficial" class="link-card" target="_blank">
                <i class="fab fa-soundcloud"></i>
                <span>SoundCloud</span>
            </a>
            <a href="https://open.spotify.com" class="link-card" target="_blank">
                <i class="fab fa-spotify"></i>
                <span>Spotify</span>
            </a>
        </div>

        <div class="footer">
            Creada con ❤ por Auritri
        </div>
    </main>

    <script>
        const header = document.getElementById('main-header');
        let isShrunk = false;

        window.addEventListener('scroll', () => {
            // Se achica apenas bajas 1px, igual que en tu otra página
            if (window.scrollY > 10) {
                if (!isShrunk) {
                    header.classList.add('shrink');
                    isShrunk = true;
                }
            } else {
                if (isShrunk) {
                    header.classList.remove('shrink');
                    isShrunk = false;
                }
            }
        });
    </script>
</body>
</html>
