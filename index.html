<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auritri | Enlaces</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #09090b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #c62828; 
            --text-main: #ffffff;
            --muted: #9aa3a6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Cinzel", serif;
            background-color: black;
            background-image: radial-gradient(circle at top right, #1e1e2e, #09090b);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- HEADER ESTÁTICO (Sin scroll pegajoso ni movimientos) --- */
        header {
            /* Subimos el logo ajustando el padding superior al mínimo */
            padding: 33px 19px 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header .logo {
            max-width: 250px; /* Tamaño intermedio ideal */
            height: auto;
            display: block;
            margin: 0 auto;
            /* Empujamos el logo un poquito más arriba manualmente */
            margin-top: -5px; 
        }

        header .tagline {
      font-size: 0.95rem;
      color: var(--muted);
      margin: 6px 0 0;
      transition: font-size 0.4s ease-in-out;
    }

        /* --- CONTENEDOR DE LINKS --- */
        .wrapper {
            width: 90%;
            max-width: 500px;
            margin: 0 auto;
            /* Ajustamos el espacio entre el tagline y los botones */
            padding: 13px 0 60px; 
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            font-family: 'Arial', sans-serif;
            background: var(--card-bg);
            border:1px solid rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            position: relative;
            cursor:pointer;
        }

        .link-card i {
            font-size: 20px;
            position: absolute;
            left: 20px;
        }

        .link-card span {
            width: 100%;
            text-align: center;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(198, 40, 40, 0.2);
        }

        footer{ 
      text-align:center; 
      color:var(white); 
      margin-top:12px; 
      font-size:0.9rem 
    }
        
    </style>
</head>
<body>

    <header>
        <img src="Relieve en negro.png" alt="Auritri" class="logo">
        <p class="tagline">Somos Auritri, somos una banda</p>
    </header>

    <main class="wrapper">
        <div class="links-container">
            <a href="https://auritri.onrender.com" class="link-card" target="_blank">
                <i class="fas fa-globe"></i>
                <span>Página Web</span>
            </a>
            <a href="https://www.instagram.com/auritrioficial/" class="link-card" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://www.tiktok.com/@auritrioficial" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://www.facebook.com/auritriofficial" class="link-card" target="_blank">
                <i class="fab fa-facebook"></i>
                <span>Facebook</span>
            </a>

            
            <a href="https://www.youtube.com/@auritri" class="link-card" target="_blank">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>
            <a href="https://soundcloud.com/auritrioficial" class="link-card" target="_blank">
                <i class="fab fa-soundcloud"></i>
                <span>SoundCloud</span>
            </a>
            <a href="#" class="link-card" target="_blank">
                <i class="fab fa-spotify"></i>
                <span>Spotify</span>
            </a>
        </div>

        <div class="footer">
            Creada con ❤ por Auritri
        </div>
    </main>

    </body>
</html>
