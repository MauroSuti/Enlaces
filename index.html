<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auritri | Enlaces</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="icon" type="image/png" href="favicon.png">

  <!-- Fuente épica (Google Fonts) -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* CSS - Estilo Moderno */
        :root {
            --primary-bg: #09090b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #ffffff;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Cinzel", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background-color: black;
            background-image: radial-gradient(circle at top right, #1e1e2e, #09090b);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 90%;
            max-width: 500px;
            padding: 40px 0;
            text-align: center;
        }

        .profile-pic {
            width: 250px;
            object-fit: cover;
        }
        
        h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .bio { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            
            /* Nuevas reglas para acomodar el ícono y el texto */
            display: flex;
            align-items: center;
            position: relative;
        }

        .link-card i {
            /* Estilo del ícono */
            font-size: 22px;
            position: absolute;
            left: 20px; /* Distancia desde la izquierda */
        }

        .link-card span {
            /* Forzamos al texto a ocupar el centro */
            width: 100%;
            text-align: center;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            border-color: var(--accent);
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="Relieve en negro.png" alt="Auritri" class="profile-pic">
        
        <p class="bio">Somos Auritri, somos una banda</p>

        <div class="links-container">
            <a href="https://auritri.onrender.com" class="link-card" target="_blank">
                <i class="fas fa-globe"></i>
                <span>Página Web</span>
            </a>
            <a href="https://www.instagram.com/auritrioficial/" class="link-card" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://www.tiktok.com/@auritrioficial" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://www.youtube.com/@auritri" class="link-card" target="_blank">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>
            <a href="https://soundcloud.com/auritrioficial" class="link-card" target="_blank">
                <i class="fab fa-soundcloud"></i>
                <span>SoundCloud</span>
            </a>
            <a href="#" class="link-card" target="_blank">
                <i class="fab fa-spotify"></i>
                <span>Spotify</span>
            </a>
        </div>

        <div class="footer">
            Creada con ❤ por Auritri
        </div>
    </div>

    <script>
        document.querySelectorAll('.link-card').forEach(item => {
            item.addEventListener('click', event => {
                // Modificado para que tome el texto correcto sin importar dónde se haga clic dentro del botón
                console.log("Visitando: " + event.currentTarget.querySelector('span').innerText);
            });
        });
    </script>
</body>
</html>
