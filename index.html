<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auritri | Enlaces</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #09090b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #c62828; /* Cambiado al rojo de Auritri */
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --muted: #9aa3a6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Cinzel", serif;
            background-color: black;
            background-image: radial-gradient(circle at top right, #1e1e2e, #09090b);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- ESTILO DEL HEADER COPIADO --- */
        header {
            padding: 28px 18px 12px;
            text-align: center;
            position: sticky;
            top: 0;
            backdrop-filter: blur(2px);
            z-index: 10;
            min-height: 240px;
            transition: all 0.4s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        header.shrink {
            padding: 14px 18px 6px;
            min-height: 120px; /* Ajustado para la versión de links */
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.4);
        }

        header .logo {
            max-width: 250px;
            height: auto;
            transition: max-width 0.4s ease-in-out;
        }

        header.shrink .logo {
            max-width: 120px;
        }

        header .tagline {
            font-size: 0.95rem;
            color: var(--muted);
            margin: 12px 0 0;
            transition: all 0.4s ease-in-out;
        }

        header.shrink .tagline {
            font-size: 0.75rem;
            margin-top: 5px;
        }

        /* --- CONTENEDOR DE LINKS --- */
        .wrapper {
            width: 90%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 0 40px;
            text-align: center;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            font-family: 'Arial', sans-serif;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            position: relative;
        }

        .link-card i {
            font-size: 20px;
            position: absolute;
            left: 20px;
        }

        .link-card span {
            width: 100%;
            text-align: center;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(198, 40, 40, 0.2);
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-dim);
        }

        @media (max-width: 600px) {
            header { min-height: 200px; }
            header.shrink { min-height: 100px; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <img src="Relieve en negro.png" alt="Auritri" class="logo">
        <p class="tagline">Somos Auritri, somos una banda</p>
    </header>

    <div class="wrapper">
        <div class="links-container">
            <a href="https://auritri.onrender.com" class="link-card" target="_blank">
                <i class="fas fa-globe"></i>
                <span>Página Web</span>
            </a>
            <a href="https://www.instagram.com/auritrioficial/" class="link-card" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://www.tiktok.com/@auritrioficial" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://www.youtube.com/@auritri" class="link-card" target="_blank">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>
            <a href="https://soundcloud.com/auritrioficial" class="link-card" target="_blank">
                <i class="fab fa-soundcloud"></i>
                <span>SoundCloud</span>
            </a>
            <a href="#" class="link-card" target="_blank">
                <i class="fab fa-spotify"></i>
                <span>Spotify</span>
            </a>
        </div>

        <div class="footer">
            Creada con ❤ por Auritri
        </div>
    </div>

    <script>
        // LOGICA DE SCROLL PARA EL HEADER
        const header = document.getElementById('main-header');
        let isShrunk = false;

        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                if (!isShrunk) {
                    header.classList.add('shrink');
                    isShrunk = true;
                }
            } else {
                if (isShrunk) {
                    header.classList.remove('shrink');
                    isShrunk = false;
                }
            }
        });

        // Log de clicks
        document.querySelectorAll('.link-card').forEach(item => {
            item.addEventListener('click', event => {
                console.log("Visitando: " + event.currentTarget.querySelector('span').innerText);
            });
        });
    </script>
</body>
</html>
